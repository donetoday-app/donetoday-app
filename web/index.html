<!DOCTYPE html>
<html>

<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta author="aj-seven">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Track what you achieve every day. One thing at a time.">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">

  <!-- Aggressive Caching & Prefetching Hints -->
  <meta http-equiv="Cache-Control" content="max-age=31536000, public">
  <link rel="preload" href="flutter_bootstrap.js" as="script">
  <link rel="preload" href="manifest.json" as="fetch" crossorigin="anonymous">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Done Today">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="icon" href="favicon.png" type="image/png" />
  <link rel="shortcut icon" href="icons/done-today.svg" type="image/x-icon" />

  <title>Done Today</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Declare local premium fonts for offline compliance and performance */
    @font-face {
      font-family: 'Outfit';
      src: url('assets/fonts/Outfit-Black.ttf') format('truetype');
      font-weight: 900;
      font-style: normal;
    }

    @font-face {
      font-family: 'JetBrains Mono';
      src: url('assets/fonts/JetBrainsMono-Bold.ttf') format('truetype');
      font-weight: bold;
      font-style: normal;
    }

    /* Prevent default browser margins and match premium dark theme */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #121212;
      overflow: hidden;
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    #loading-splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #121212;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      opacity: 1;
      transition: opacity 0.5s ease-out;
    }

    .splash-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      text-align: center;
    }

    /* Core App Icon container */
    .app-icon-container {
      position: relative;
      width: 80px;
      height: 80px;
      border-radius: 18px; /* Elegant rounded square matching the app icon style */
      overflow: hidden;
      animation: pulseIcon 2.4s ease-in-out infinite;
      z-index: 2;
    }

    .app-icon-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Spaced clean typography matching Flutter exactly */
    .title-text {
      font-family: 'Outfit', sans-serif;
      color: #ffffff;
      font-size: 15px;
      font-weight: 900;
      letter-spacing: 4px;
      margin-top: 32px;
      text-transform: uppercase;
      text-align: center;
    }

    .subtitle-text {
      font-family: 'JetBrains Mono', monospace;
      color: rgba(99, 102, 241, 0.7);
      font-size: 10.5px;
      font-weight: bold;
      letter-spacing: 2.5px;
      margin-top: 8px;
      text-transform: uppercase;
      text-align: center;
    }

    /* Elegant thin brand loading bar */
    .progress-bar-container {
      width: 220px;
      height: 3px;
      background-color: rgba(255, 255, 255, 0.04);
      margin-top: 28px;
      overflow: hidden;
      border-radius: 1.5px;
    }

    .progress-bar-fill {
      width: 40%;
      height: 100%;
      background-color: #6366F1;
      animation: indeterminateProgress 1.6s infinite ease-in-out;
    }

    /* Keyframe Animations */
    @keyframes pulseIcon {
      0%, 100% {
        transform: scale(0.96);
      }
      50% {
        transform: scale(1.02);
      }
    }

    @keyframes indeterminateProgress {
      0% { transform: translateX(-100%); }
      50% { transform: translateX(50%); }
      100% { transform: translateX(250%); }
    }
  </style>
</head>

<body>
  <!-- Elegant Initial Splash Screen for Web Engine Load -->
  <div id="loading-splash">
    <div class="splash-container">
      <div class="app-icon-container">
        <img src="icons/logo.png" alt="Done Today Logo" class="app-icon-img">
      </div>
      <div class="title-text">DONE TODAY</div>
      <div class="subtitle-text">LOADING APP...</div>
      <div class="progress-bar-container">
        <div class="progress-bar-fill"></div>
      </div>
    </div>
  </div>

  <script>
    // Safety Timeout: If Flutter fails to mount within 8 seconds (due to offline dev WebSocket errors or script blockages)
    var bootTimeout = setTimeout(function() {
      var subtitle = document.querySelector('.subtitle-text');
      if (subtitle) {
        subtitle.innerText = "OFFLINE MODE • TAP TO RETRY";
        subtitle.style.color = "#6366F1";
        subtitle.style.animation = "pulseIcon 1.5s ease-in-out infinite";
      }
      var splash = document.getElementById('loading-splash');
      if (splash) {
        splash.style.cursor = 'pointer';
        splash.onclick = function() {
          window.location.reload();
        };
      }
    }, 8000);

    // Start checking for Flutter view to bypass window.load latency and fade out instantly on cached loads
    var checkFlutter = setInterval(function() {
      var host = document.querySelector('flutter-view') || document.querySelector('flt-glass-pane');
      if (host) {
        clearInterval(checkFlutter);
        clearTimeout(bootTimeout);
        var splash = document.getElementById('loading-splash');
        if (splash) {
          splash.style.opacity = '0';
          setTimeout(function() {
            splash.remove();
          }, 500);
        }
      }
    }, 20);
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
