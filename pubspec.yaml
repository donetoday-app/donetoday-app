name: done_today
description: "Track what you achieve every day. One thing at a time."

publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0-beta-1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  intl: ^0.20.2
  flutter_lints: ^6.0.0
  connectivity_plus: ^6.1.5
  uuid: ^4.5.1
  table_calendar: ^3.0.9
  http: ^1.5.0
  fl_chart: ^1.2.0
  timeline_tile: ^2.0.0
  url_launcher: ^6.3.2
  app_links: ^6.4.1
  flutter_colorpicker: ^1.1.0
  change_app_package_name: ^1.5.0
  confetti: ^0.8.0
  get: ^4.7.2
  go_router: ^14.7.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  file_picker: ^8.1.3
  share_plus: ^12.0.2
  encrypt: ^5.0.3
  crypto: ^3.0.6
  archive: ^4.0.9
  logger: ^2.5.0
  emoji_picker_flutter: ^3.0.0
  gpt_markdown: ^1.1.7
  package_info_plus: ^9.0.1
  webview_flutter: ^4.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  icons_launcher: ^3.1.0

icons_launcher:
  image_path: "lib/assets/icon/launcher.png"
  platforms:
    android:
      enable: true
      adaptive_background_color: "#ffffff"
      adaptive_foreground_image: "lib/assets/icon/launcher_alter.png"
    ios:
      enable: true
    windows:
      enable: true
    linux:
      enable: true
    web:
      enable: true
      background_color: "#0E0E0E0E"
      theme_color: "#1E1E1E"

#flutter_native_splash:
#  color: "#FFFFFF"
#  image: "lib/assets/images/splash.png"#
#  android: true
#  ios: true

# The following section is specific to Flutter packages.
flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true
  assets:
    - lib/assets/icon/
    - lib/assets/fonts/

  fonts:
    - family: Outfit
      fonts:
        - asset: lib/assets/fonts/Outfit.ttf
    - family: Inter
      fonts:
        - asset: lib/assets/fonts/Inter.ttf
    - family: JetBrainsMono
      fonts:
        - asset: lib/assets/fonts/JetBrainsMono.ttf
        - asset: lib/assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
    - family: Merriweather
      fonts:
        - asset: lib/assets/fonts/Merriweather.ttf
        - asset: lib/assets/fonts/Merriweather-Italic.ttf
          style: italic
